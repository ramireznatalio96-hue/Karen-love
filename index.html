
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  color: white;
  font-family: Arial, sans-serif;

  /* BACKGROUND IMAGE */
  background: url('photo.jpg') no-repeat center center fixed;
  background-size: cover;
  perspective: 1000px; /* needed for 3D rotation */
}

/* TOP TEXT */
#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.5em;
  z-index: 50; /* above rose and petals */
  text-shadow: 0 0 10px red, 0 0 20px red;
}

/* BOTTOM TEXT */
#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.6em;
  z-index: 50; /* above rose and petals */
  text-shadow: 0 0 10px red;
}

/* ROSE EMOJI CENTERED */
#rose {
  position: absolute;
  top: 50%;
  left: 50%;
  font-size: 180px; /* size of the rose */
  transform: translate(-50%, -50%);
  animation: rotateY 5s linear infinite;
  z-index: 40; /* above petals, below text */
  text-shadow:
    0 0 5px #ff4d6d,
    0 0 15px #ff1a3c,
    0 0 30px #ff0033,
    0 5px 15px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
}

/* PETALS */
.petal {
  position: absolute;
  width: 14px;
  height: 18px;
  background: radial-gradient(circle, #ff4d6d, #800020);
  border-radius: 50% 50% 60% 60%;
  animation: fall linear infinite;
  z-index: 30; /* behind rose */
}

/* ROTATE ROSE */
@keyframes rotateY {
  from { transform: translate(-50%, -50%) rotateY(0deg); }
  to   { transform: translate(-50%, -50%) rotateY(360deg); }
}

/* FALLING PETALS */
@keyframes fall {
  0% { transform: translateY(-10vh); opacity:0; }
  20% { opacity:1; }
  100% { transform: translateY(110vh); opacity:0; }
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>

<!-- ROTATING ROSE -->
<div id="rose">🌹</div>

<div id="bottomText">Te quiero ver cada minuto</div>

<script>
// PETALS
for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "petal";

  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (4 + Math.random()*4) + "s";

  document.body.appendChild(p);
}
</script>

</body>
</html>
