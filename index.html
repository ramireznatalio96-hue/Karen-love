
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.5em;
  z-index: 10;
}

#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.8em;
  z-index: 10;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>
<div id="bottomText">Te quiero ver cada minuto</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1c3e7b9.mp3">
</audio>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';

// MOBILE MUSIC FIX
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
}, { once: true });

// Scene
const scene = new THREE.Scene();

// Camera (FIXED)
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 10;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(3, 3, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0xff0033, 2);
light2.position.set(-3, -2, 4);
scene.add(light2);

// "Rose" (fixed size & position)
const rose = new THREE.Mesh(
  new THREE.SphereGeometry(0.8, 64, 64),
  new THREE.MeshStandardMaterial({
    color: 0xff0033,
    roughness: 0.4
  })
);
rose.position.y = -0.5;
scene.add(rose);

// Petals (VISIBLE now)
const petals = [];
for (let i = 0; i < 40; i++) {
  const petal = new THREE.Mesh(
    new THREE.PlaneGeometry(0.2, 0.3),
    new THREE.MeshBasicMaterial({
      color: 0xff3366,
      side: THREE.DoubleSide
    })
  );

  petal.position.set(
    (Math.random() - 0.5) * 6,
    Math.random() * 4,
    (Math.random() - 0.5) * 6
  );

  petal.speed = Math.random() * 0.02 + 0.01;

  scene.add(petal);
  petals.push(petal);
}

// Animation
function animate() {
  requestAnimationFrame(animate);

  rose.rotation.y += 0.01;

  petals.forEach(p => {
    p.position.y -= p.speed;
    p.rotation.z += 0.02;

    if (p.position.y < -3) {
      p.position.y = 4;
    }
  });

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
