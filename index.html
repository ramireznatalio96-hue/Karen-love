<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #1a0000, #000);
  font-family: Arial;
  color: white;
}

/* Text */
#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.5em;
}

#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.8em;
}

/* Rose */
#rose {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  transform: translate(-50%, -50%);
  animation: rotate 10s linear infinite;
  filter: drop-shadow(0 0 20px red);
}

/* Petals */
.petal {
  position: absolute;
  width: 15px;
  height: 20px;
  background: radial-gradient(circle, #ff4d6d, #b3002d);
  border-radius: 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes rotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh); }
}

#musicBtn {
  position: absolute;
  top: 10px;
  left: 10px;
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>
<div id="bottomText">Te quiero ver cada minuto</div>

<button id="musicBtn">Play Music ❤️</button>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1c3e7b9.mp3">
</audio>

<!-- Rose image -->
<img id="rose" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Red_rose.png/512px-Red_rose.png">

<script>
// MUSIC (guaranteed mobile play)
document.body.addEventListener("click", () => {
  document.getElementById("music").play();
}, { once: true });

// Create falling petals
for (let i = 0; i < 30; i++) {
  const petal = document.createElement("div");
  petal.className = "petal";

  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(petal);
}
</script>

</body>
</html>
