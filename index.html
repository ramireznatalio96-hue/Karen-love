
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.5em;
  z-index: 10;
}

#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.8em;
  z-index: 10;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>
<div id="bottomText">Te quiero ver cada minuto</div>

<button onclick="playMusic()" style="position:absolute;top:10px;left:10px;z-index:10;">
Play Music ❤️
</button>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1c3e7b9.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
function playMusic() {
  document.getElementById("music").play();
}

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// Camera
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 4;

// Renderer (IMPORTANT FIX)
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false,
  powerPreference: "high-performance"
});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// STRONG lighting (so you actually SEE it)
const light1 = new THREE.PointLight(0xffffff, 3);
light1.position.set(2, 3, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0xff0033, 3);
light2.position.set(-2, -2, 4);
scene.add(light2);

// Rose (bigger + brighter)
const geometry = new THREE.SphereGeometry(1.2, 64, 64);
const material = new THREE.MeshStandardMaterial({
  color: 0xff0033,
  emissive: 0x220000,
  roughness: 0.4
});
const rose = new THREE.Mesh(geometry, material);
scene.add(rose);

// Petals
const petals = [];
for (let i = 0; i < 30; i++) {
  const geo = new THREE.PlaneGeometry(0.2, 0.3);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xff3366,
    side: THREE.DoubleSide
  });

  const p = new THREE.Mesh(geo, mat);

  p.position.set(
    (Math.random() - 0.5) * 4,
    Math.random() * 3,
    (Math.random() - 0.5) * 4
  );

  p.speed = Math.random() * 0.02 + 0.01;

  scene.add(p);
  petals.push(p);
}

// Animation
function animate() {
  requestAnimationFrame(animate);

  rose.rotation.y += 0.01;

  petals.forEach(p => {
    p.position.y -= p.speed;
    p.rotation.z += 0.02;

    if (p.position.y < -3) {
      p.position.y = 3;
    }
  });

  renderer.render(scene, camera);
}

animate();

// Resize fix
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
