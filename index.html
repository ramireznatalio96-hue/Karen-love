
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* TOP TEXT */
#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.4em;
  z-index: 10;
}

/* BOTTOM TEXT */
#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.6em;
  z-index: 10;
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>
<div id="bottomText">Te quiero ver cada minuto</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA (FIXED so object is visible)
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 8;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(3, 3, 5);
scene.add(light);

// ROSE (visible size)
const rose = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshStandardMaterial({ color: 0xff0033 })
);
scene.add(rose);

// PETALS (simple and visible)
const petals = [];

for (let i = 0; i < 30; i++) {
  const petal = new THREE.Mesh(
    new THREE.PlaneGeometry(0.2, 0.3),
    new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide })
  );

  petal.position.set(
    (Math.random() - 0.5) * 5,
    Math.random() * 3,
    (Math.random() - 0.5) * 5
  );

  petal.speed = Math.random() * 0.02 + 0.01;

  scene.add(petal);
  petals.push(petal);
}

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  rose.rotation.y += 0.01;

  petals.forEach(p => {
    p.position.y -= p.speed;
    if (p.position.y < -3) p.position.y = 3;
  });

  renderer.render(scene, camera);
}

animate();

// RESIZE FIX
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
