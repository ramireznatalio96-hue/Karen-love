
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Karen ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

#title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  font-size: 2.5em;
  z-index: 10;
}

#bottomText {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 1.8em;
  z-index: 10;
}
</style>
</head>

<body>

<div id="title">Karen te quiero mucho</div>
<div id="bottomText">Te quiero ver cada minuto</div>

<button onclick="playMusic()" style="position:absolute;top:10px;left:10px;z-index:10;">
Play Music ❤️
</button>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1c3e7b9.mp3">
</audio>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';

function playMusic() {
  document.getElementById("music").play();
}
window.playMusic = playMusic;

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 4;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.PointLight(0xffffff, 3);
light.position.set(2, 3, 5);
scene.add(light);

// Rose
const rose = new THREE.Mesh(
  new THREE.SphereGeometry(1.2, 64, 64),
  new THREE.MeshStandardMaterial({ color: 0xff0033 })
);
scene.add(rose);

// Animate
function animate() {
  requestAnimationFrame(animate);
  rose.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
